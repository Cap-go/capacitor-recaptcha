<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-recaptcha Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/capacitor-recaptcha</h1>

      <label for="site-key">Site key</label>
      <input id="site-key" type="text" autocomplete="off" placeholder="Uses Capacitor config when empty" />

      <label for="action-name">Action</label>
      <input id="action-name" type="text" value="login" />

      <label class="toggle">
        <input id="enterprise-mode" type="checkbox" checked />
        <span>Enterprise</span>
      </label>

      <div class="actions">
        <button id="load-client">Load</button>
        <button id="execute-action">Execute</button>
        <button id="get-version">Version</button>
      </div>

      <pre id="plugin-output">Ready.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
